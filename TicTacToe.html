<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #ecf0f1; /* Soft White */
      color: #2c3e50; /* Midnight Blue */
      text-align: center;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
      color: #e74c3c; /* Vibrant Red */
    }
    #status {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #27ae60; /* Emerald Green */
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      gap: 15px;
      justify-content: center;
      transition: transform 0.3s ease-in-out;
    }
    .cell {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3em;
      border: 2px solid #bdc3c7; /* Silver */
      border-radius: 10px;
      background-color: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s, transform 0.3s;
      cursor: pointer;
    }
    .cell:hover:not(.taken) {
      background-color: #bdc3c7; /* Silver */
      transform: scale(1.1);
    }
    .cell.taken {
      cursor: not-allowed;
      color: #7f8c8d; /* Light Gray */
    }
    .cell.winner {
      background-color: #e74c3c; /* Vibrant Red */
      color: #fff;
      transition: background-color 0.3s ease, transform 0.3s ease;
    }
    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 1.2em;
      border: none;
      border-radius: 5px;
      background-color: #2c3e50; /* Midnight Blue */
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.3s;
    }
    button:hover {
      background-color: #34495e; /* Deep Blue */
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player 1's turn (X)</div>
  <div class="board" id="board"></div>
  <button onclick="restartGame()">Restart Game</button>

  <script src="app.js"></script>
</body>
</html>
